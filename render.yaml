services:
  # FastAPI Backend Web Service
  - type: web
    name: educonnect-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_CONNECTION_STRING
        sync: false
      - key: PROJECT_NAME
        value: "AI Personalized Learning Platform"
      - key: API_V1_STR
        value: "/api/v1"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"

  # React Frontend Static Site
  - type: web
    name: educonnect-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          type: web
          name: educonnect-backend
          property: url
